<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RavenStore - Maintenance</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="maintenance.css">

</head>
<body>

<div class="container">

  <div class="logo">RAVENSTORE</div>

  <div class="card">
    <h1>Maintenance</h1>

    <div id="message" class="message">
      Sistem sedang dalam perbaikan...
    </div>

    <div class="divider"></div>

    <div class="countdown">

  <div class="time-box">
    <span id="hour">00</span>
    <small>Jam</small>
  </div>

  <div class="time-box">
    <span id="minute">00</span>
    <small>Menit</small>
  </div>

  <div class="time-box">
    <span id="second">00</span>
    <small>Detik</small>
  </div>

</div>

<div class="timer-label">Perkiraan selesai</div>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>
  </div>

  <div class="footer">
    © RavenStore
  </div>

</div>

<script src="maintenance.js" defer></script>

</body>
</html>
